    <title> Contact Page </title>

<body>

    <a href = "contact.html"> Contact </a>
    <div class = "container">
        <h1>Contact Us</h1>
        <p>This is the contact page.</p>

        <form action="">

            <label for="name"> Full Name:</label><br>
           <input type="text" name="name" placeholder="Enter Your Name"required><br>

            <label for="email"> Email:</label><br>
            <input type="email" name="email" placeholder="Enter Your Email"required><br>

            <label for="phone"> Phone Number:</label><br>
            <input type="number" name="phone" placeholder="Enter Your Phone Number"required><br>
            
            <label for="subject line"> Subject line:</label><br>
            <input type="text" name="subject line" placeholder="Enter Your Subject Line"required><br>
            <select name="subject line">
                <option value="other">Other</option>
                <option value="feedback">Feedback</option>
                <option value="inquiry">Inquiry</option>
            </select>

            <label for="message"> Message:</label><br>
            <textarea name="message" placeholder="Enter Your Message" required></textarea><br>

         <br>
            <button type="send message">Send Message</button>
              
        </form>

    </div>
</body>
